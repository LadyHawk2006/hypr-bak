general {
    col.active_border = rgba(91927b77)
    col.inactive_border = rgba(46483555)
}

misc {
    background_color = rgba(13140aFF)
}

plugin {
    hyprbars {
        # Honestly idk if it works like css, but well, why not
        bar_text_font = Google Sans Flex Medium, Rubik, Geist, AR One Sans, Reddit Sans, Inter, Roboto, Ubuntu, Noto Sans, sans-serif
        bar_height = 30
        bar_padding = 10
        bar_button_padding = 5
        bar_precedence_over_border = true
        bar_part_of_window = true

        bar_color = rgba(13140aFF)
        col.text = rgba(e4e3d2FF)


        # example buttons (R -> L)
        # hyprbars-button = color, size, on-click
        hyprbars-button = rgb(e4e3d2), 13, 󰖭, hyprctl dispatch killactive
        hyprbars-button = rgb(e4e3d2), 13, 󰖯, hyprctl dispatch fullscreen 1
        hyprbars-button = rgb(e4e3d2), 13, 󰖰, hyprctl dispatch movetoworkspacesilent special
    }
}

windowrule = border_color rgba(fcafe1AA) rgba(fcafe177), match:pin 1
