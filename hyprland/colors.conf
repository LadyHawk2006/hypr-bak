general {
    col.active_border = rgba(9a907777)
    col.inactive_border = rgba(4e463155)
}

misc {
    background_color = rgba(171308FF)
}

plugin {
    hyprbars {
        # Honestly idk if it works like css, but well, why not
        bar_text_font = Google Sans Flex Medium, Rubik, Geist, AR One Sans, Reddit Sans, Inter, Roboto, Ubuntu, Noto Sans, sans-serif
        bar_height = 30
        bar_padding = 10
        bar_button_padding = 5
        bar_precedence_over_border = true
        bar_part_of_window = true

        bar_color = rgba(171308FF)
        col.text = rgba(ebe1cfFF)


        # example buttons (R -> L)
        # hyprbars-button = color, size, on-click
        hyprbars-button = rgb(ebe1cf), 13, 󰖭, hyprctl dispatch killactive
        hyprbars-button = rgb(ebe1cf), 13, 󰖯, hyprctl dispatch fullscreen 1
        hyprbars-button = rgb(ebe1cf), 13, 󰖰, hyprctl dispatch movetoworkspacesilent special
    }
}

windowrule = border_color rgba(e4b5fbAA) rgba(e4b5fb77), match:pin 1
